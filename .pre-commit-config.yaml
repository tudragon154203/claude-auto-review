repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^claude_auto_review/
        additional_dependencies: []
  - repo: local
    hooks:
      - id: unit-tests
        name: unit tests
        entry: python -m unittest discover -s tests
        language: system
        pass_filenames: false
        files: ^(claude_auto_review/|hooks/|tests/).*\.py$
